name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (Node + pnpm via mise)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Typecheck
        run: mise run typecheck

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test
