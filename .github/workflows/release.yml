name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: getkops-runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (Node + pnpm via mise)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure zip is available (ARC runners are minimal)
        run: |
          if command -v zip >/dev/null 2>&1; then exit 0; fi
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then SUDO="sudo"; fi
          if command -v apt-get >/dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y zip
          elif command -v apk >/dev/null 2>&1; then
            $SUDO apk add --no-cache zip
          else
            echo "::error::no apt-get/apk available to install zip"; exit 1
          fi

      - name: Build zip
        run: |
          zip -r kops-filter-exporter-v${{ steps.version.outputs.version }}.zip \
            dist/ \
            _locales/ \
            manifest.json \
            icons/ \
            LICENSE \
            -x "*.git*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kops Filter Exporter v${{ steps.version.outputs.version }}"
          body: |
            ## Installation
            1. Download `kops-filter-exporter-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip the archive
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder
          files: kops-filter-exporter-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true