name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          zip -r kops-filter-exporter-v${{ steps.version.outputs.version }}.zip \
            dist/ \
            manifest.json \
            icons/ \
            LICENSE \
            -x "*.git*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kops Filter Exporter v${{ steps.version.outputs.version }}"
          body: |
            ## Installation
            1. Download `kops-filter-exporter-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip the archive
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder
          files: kops-filter-exporter-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
