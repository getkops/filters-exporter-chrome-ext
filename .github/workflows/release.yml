name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (Node + pnpm via mise)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Chrome zip
        run: |
          zip -r kops-filter-exporter-v${{ steps.version.outputs.version }}.zip \
            dist/ \
            _locales/ \
            manifest.json \
            icons/ \
            LICENSE \
            -x "*.git*"

      - name: Build Firefox zip
        run: |
          mise exec -- node scripts/build-firefox.mjs
          cd build/firefox
          zip -r ../../kops-filter-exporter-firefox-v${{ steps.version.outputs.version }}.zip . -x "*.git*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kops Filter Exporter v${{ steps.version.outputs.version }}"
          body: |
            ## Install on Chrome
            1. Download `kops-filter-exporter-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip the archive
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ## Install on Firefox (temporary — requires Firefox 128+)
            1. Download `kops-filter-exporter-firefox-v${{ steps.version.outputs.version }}.zip` below
            2. Open `about:debugging#/runtime/this-firefox`
            3. Click **Load Temporary Add-on** → select the zip
          files: |
            kops-filter-exporter-v${{ steps.version.outputs.version }}.zip
            kops-filter-exporter-firefox-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
