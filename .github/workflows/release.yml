name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # GitHub-hosted: this is a public repo (hosted minutes are free), the job is a
    # rare tag-triggered extension build with no cluster/registry dependency, and
    # `[self-hosted, Linux, X64]` matched nothing after the ARC migration (the
    # gha-runner-scale-set runners only carry the label `getkops-runners`), so
    # every release hung until GitHub's 24h auto-cancel. mise provides the toolchain.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (Node + pnpm via mise)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          zip -r kops-filter-exporter-v${{ steps.version.outputs.version }}.zip \
            dist/ \
            _locales/ \
            manifest.json \
            icons/ \
            LICENSE \
            -x "*.git*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kops Filter Exporter v${{ steps.version.outputs.version }}"
          body: |
            ## Installation
            1. Download `kops-filter-exporter-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip the archive
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder
          files: kops-filter-exporter-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
